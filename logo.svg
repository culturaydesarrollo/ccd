<svg viewBox=\"0 0 600 300\" xmlns=\"http://www.w3.org/2000/svg\">\n  <!-- Raíces (versión simplificada SVG) -->\n  <g id=\"roots\" stroke=\"#3D2817\" stroke-width=\"8\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n    <!-- Raíz izquierda -->\n    <path d=\"M 80 80 Q 70 120 80 160 Q 85 180 95 190\"/>\n    <!-- Raíz central izquierda -->\n    <path d=\"M 120 60 Q 110 110 120 160 Q 125 185 140 200\"/>\n    <!-- Raíz central derecha -->\n    <path d=\"M 160 50 Q 160 110 165 165 Q 170 190 185 205\"/>\n  </g>\n  \n  <!-- Cuadrado marrón con logo -->\n  <rect x=\"80\" y=\"130\" width=\"280\" height=\"120\" fill=\"#3D2817\" rx=\"8\"/>\n  \n  <!-- C -->\n  <text x=\"120\" y=\"230\" font-family=\"Georgia, serif\" font-size=\"80\" font-style=\"italic\" fill=\"white\" font-weight=\"bold\">C</text>\n  \n  <!-- D -->\n  <text x=\"200\" y=\"230\" font-family=\"Georgia, serif\" font-size=\"80\" font-style=\"italic\" fill=\"white\" font-weight=\"bold\">D</text>\n  \n  <!-- Texto CULTURA & DESARROLLO -->\n  <text x=\"310\" y=\"165\" font-family=\"Arial, sans-serif\" font-size=\"24\" font-weight=\"bold\" fill=\"white\">CULTURA &amp;</text>\n  <text x=\"310\" y=\"195\" font-family=\"Arial, sans-serif\" font-size=\"24\" font-weight=\"bold\" fill=\"white\">DESARROLLO</text>\n  \n  <!-- CORPORACIÓN (arriba) -->\n  <text x=\"310\" y=\"125\" font-family=\"Arial, sans-serif\" font-size=\"14\" letter-spacing=\"2\" fill=\"#3D2817\">CORPORACIÓN</text>\n</svg>